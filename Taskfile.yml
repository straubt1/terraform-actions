version: "3"

vars:
  EXAMPLES_DIR: examples

tasks:
  clean:
    desc: Remove all Terraform state, lock files, and .terraform/ directories from every example
    cmds:
      - |
        find {{.EXAMPLES_DIR}} -name "*.tfstate" -o -name "*.tfstate.backup" -o -name "*.lock.*" | xargs rm -f 2>/dev/null
        find {{.EXAMPLES_DIR}} -type d -name ".terraform" | xargs rm -rf 2>/dev/null
        echo "Cleaned all Terraform artifacts from {{.EXAMPLES_DIR}}/"

  validate:
    desc: Run init, plan, apply, and destroy on every example folder
    deps: [clean]
    cmds:
      - |
        FAILED_DIRS=""
        # Find all directories containing .tf files (Terraform root modules)
        # Skip debug/ and old-way/ (old-way is intentionally demonstrating the broken pattern)
        for dir in $(find {{.EXAMPLES_DIR}} -name '*.tf' -not -path '*/debug/*' -not -path '*/.terraform/*' -exec dirname {} \; | sort -u); do
          echo ""
          echo "=========================================="
          echo "  $dir"
          echo "=========================================="

          DIR_OK=1
          for step in \
            "terraform -chdir=$dir init -input=false" \
            "terraform -chdir=$dir plan -input=false" \
            "terraform -chdir=$dir apply -auto-approve -input=false" \
            "terraform -chdir=$dir destroy -auto-approve -input=false"; do

            echo "--- $step ---"
            if ! $step 2>&1; then
              echo ""
              echo "ERROR: '$step' failed in $dir"
              DIR_OK=0
              break
            fi
          done

          if [ $DIR_OK -eq 0 ]; then
            FAILED_DIRS="$FAILED_DIRS\n  - $dir"
          fi
        done

        echo ""
        if [ -n "$FAILED_DIRS" ]; then
          echo "RESULT: Some examples failed:"
          echo -e "$FAILED_DIRS"
          exit 1
        else
          echo "RESULT: All examples passed."
        fi
      - task: clean

  capture:01-hello-action:
    desc: Run capture script and update Expected Output in examples/01-hello-action
    cmds:
      - bash assets/01-hello-action-capture.sh > assets/01-hello-action-output.txt 2>&1

  capture:02-old-way-vs-new-way:
    desc: Run capture script and update Expected Output in examples/02-old-way-vs-new-way
    cmds:
      - bash assets/02-old-way-vs-new-way-capture.sh > assets/02-old-way-vs-new-way-output.txt 2>&1

  capture:03-before-after:
    desc: Run capture script and update Expected Output in examples/03-before-after
    cmds:
      - bash assets/03-before-after-capture.sh > assets/03-before-after-output.txt 2>&1

  capture:04-multiple-actions:
    desc: Run capture script and update Expected Output in examples/04-multiple-actions
    cmds:
      - bash assets/04-multiple-actions-capture.sh > assets/04-multiple-actions-output.txt 2>&1

  capture:05-conditional-actions:
    desc: Run capture script and update Expected Output in examples/05-conditional-actions
    cmds:
      - bash assets/05-conditional-actions-capture.sh > assets/05-conditional-actions-output.txt 2>&1

  capture:06-invoke-only:
    desc: Run capture script and update Expected Output in examples/06-invoke-only
    cmds:
      - bash assets/06-invoke-only-capture.sh > assets/06-invoke-only-output.txt 2>&1

  capture:07-inline-script:
    desc: Run capture script and update Expected Output in examples/07-inline-script
    cmds:
      - bash assets/07-inline-script-capture.sh > assets/07-inline-script-output.txt 2>&1

  capture:08-action-variables:
    desc: Run capture script and update Expected Output in examples/08-action-variables
    cmds:
      - bash assets/08-action-variables-capture.sh > assets/08-action-variables-output.txt 2>&1

  capture:all:
    desc: Run all capture scripts and update Expected Output in every example README
    deps:
      - capture:01-hello-action
      - capture:02-old-way-vs-new-way
      - capture:03-before-after
      - capture:04-multiple-actions
      - capture:05-conditional-actions
      - capture:06-invoke-only
      - capture:07-inline-script
      - capture:08-action-variables

  record:all:
    desc: Generate all demo GIFs for every example
    deps:
      - record:01-hello-action
      - record:02-old-way-vs-new-way
      - record:03-before-after
      - record:04-multiple-actions
      - record:05-conditional-actions
      - record:06-invoke-only
      - record:07-inline-script
      - record:08-action-variables

  record:01-hello-action:
    desc: Generate the demo GIFs for examples/01-hello-action
    cmds:
      - vhs assets/01-hello-action-01.tape
      - vhs assets/01-hello-action-02.tape
      - vhs assets/01-hello-action-03.tape

  record:02-old-way-vs-new-way:
